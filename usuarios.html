<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuários — Vendemmia Análise de Crédito</title>
  <script src="db.js?v=3"></script>
  <script src="components.js?v=3"></script>
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* ── Layout ─────────────────────────────────── */
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    /* ── Card de usuário ────────────────────────── */
    .user-card-item {
      background: var(--purple-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.25rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: .85rem;
      transition: border-color .2s;
    }
    .user-card-item:hover { border-color: rgba(139,92,246,.4); }

    .user-card-header {
      display: flex;
      align-items: center;
      gap: .95rem;
    }
    .user-avatar-lg {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .user-info-main { flex: 1; min-width: 0; }
    .user-info-name {
      font-size: .95rem; font-weight: 700;
      color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-info-email {
      font-size: .78rem; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: .15rem;
    }

    /* ── Status / Role badges ───────────────────── */
    .user-card-meta {
      display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
    }
    .role-badge {
      font-size: .7rem; font-weight: 700; letter-spacing: .4px;
      text-transform: uppercase; padding: 3px 9px; border-radius: 20px;
    }
    .role-Operações    { background: rgba(96,165,250,.15); color: #60a5fa; }
    .role-Financeiro   { background: rgba(245,158,11,.15); color: #f59e0b; }
    .role-Administrador{ background: rgba(139,92,246,.2);  color: #a78bfa; }
    .role-Diretor      { background: rgba(1,225,142,.15);  color: #01E18E; }

    .status-badge {
      font-size: .7rem; font-weight: 600; padding: 3px 9px; border-radius: 20px;
    }
    .status-ativo   { background: rgba(1,225,142,.12); color: #01E18E; }
    .status-pendente{ background: rgba(245,158,11,.12); color: #f59e0b; }

    /* ── Ações do card ──────────────────────────── */
    .user-card-actions {
      display: flex; gap: .5rem; justify-content: flex-end; padding-top: .4rem;
      border-top: 1px solid var(--glass-border);
    }

    /* ── Empty state ────────────────────────────── */
    .empty-state {
      text-align: center; padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 1rem; opacity: .4; }
    .empty-state p   { font-size: .9rem; }

    /* ── Modal ──────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(6px);
      z-index: 1000; display: none;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; animation: fadeIn .18s ease; }
    .modal-box {
      background: var(--purple-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 2rem; width: 90%; max-width: 460px;
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
      animation: slideUp .22s ease;
    }
    .modal-title {
      font-size: 1.05rem; font-weight: 700; color: var(--text-primary);
      margin-bottom: 1.5rem;
    }
    .form-field { margin-bottom: 1.1rem; }
    .form-label {
      display: block; font-size: .75rem; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: .4px; margin-bottom: .45rem;
    }
    .form-input, .form-select {
      width: 100%; box-sizing: border-box;
      background: var(--purple-mid); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: .7rem .9rem;
      color: var(--text-primary); font-size: .88rem; font-family: inherit;
      outline: none; transition: border-color .2s;
    }
    .form-input:focus, .form-select:focus { border-color: rgba(139,92,246,.6); }
    .form-select option { background: #1c1840; }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; margin-top: 1.75rem; }

    /* ── Delete modal ───────────────────────────── */
    .modal-icon { font-size: 2.5rem; text-align: center; margin-bottom: .75rem; }
    .modal-sub  { font-size: .85rem; color: var(--text-muted); text-align: center; margin-bottom: 1.5rem; line-height: 1.6; }

    /* ── Toast ──────────────────────────────────── */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
      display: flex; align-items: center; gap: .6rem;
      background: var(--purple-mid); border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm); padding: .8rem 1.2rem;
      color: var(--text-primary); font-size: .85rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      transform: translateY(6px); opacity: 0;
      transition: opacity .25s, transform .25s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: rgba(1,225,142,.4); }
    .toast.error   { border-color: rgba(239,68,68,.4); }

    @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { transform:translateY(24px);opacity:0 } to { transform:translateY(0);opacity:1 } }
  </style>
</head>
<body>
<script>
  const session = DB.auth.requireAuth();
  if (!session || !['Administrador','Admin'].some(r => (session.role||'').includes(r))) {
    window.location.href = 'index.html';
  }
</script>

<div class="app-shell">
  <aside class="sidebar"></aside>
  <div class="main-area">

    <header class="topbar">
      <div class="topbar-title">
        <div class="breadcrumb">Gestão</div>
        <h1>Usuários</h1>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openCreateModal()">
          <svg viewBox="0 0 24 24" fill="none" width="15" height="15" style="margin-right:.4rem"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Novo Usuário
        </button>
      </div>
    </header>

    <main class="page-content">
      <div id="users-grid" class="users-grid">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/></svg>
          <p>Carregando usuários...</p>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- ── Modal: Criar / Editar Usuário ── -->
<div class="modal-overlay" id="user-modal">
  <div class="modal-box">
    <div class="modal-title" id="user-modal-title">Novo Usuário</div>
    <div class="form-field">
      <label class="form-label">Nome completo</label>
      <input id="u-name" class="form-input" type="text" placeholder="Ex: João Silva" />
    </div>
    <div class="form-field">
      <label class="form-label">E-mail corporativo</label>
      <input id="u-email" class="form-input" type="email" placeholder="joao@vendemmia.com.br" />
    </div>
    <div class="form-field">
      <label class="form-label">Papel</label>
      <select id="u-role" class="form-select">
        <option value="Operações">Operações — cria, envia e edita análises, faz consultas</option>
        <option value="Financeiro">Financeiro — aprova / nega crédito, faz consultas</option>
        <option value="Administrador">Administrador — acesso total + criação de usuários</option>
        <option value="Diretor">Diretor — acesso total com perfil de diretoria</option>
      </select>
    </div>
    <div id="u-email-info" style="font-size:.78rem;color:var(--text-muted);margin-top:-.4rem;margin-bottom:.6rem;display:none;">
      Um e-mail de boas-vindas será enviado automaticamente para o usuário definir a senha.
    </div>
    <div id="u-error" style="display:none;font-size:.8rem;color:#ef4444;margin-top:.5rem;"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeUserModal()">Cancelar</button>
      <button class="btn btn-primary" id="u-submit-btn" onclick="submitUserModal()">Criar e enviar convite</button>
    </div>
  </div>
</div>

<!-- ── Modal: Confirmar Exclusão ── -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal-box" style="text-align:center;">
    <div class="modal-icon">🗑️</div>
    <div class="modal-title" style="text-align:center;">Excluir Usuário</div>
    <div class="modal-sub" id="delete-modal-sub"></div>
    <div class="modal-actions" style="justify-content:center;">
      <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancelar</button>
      <button class="btn btn-danger"    onclick="confirmDelete()">Excluir</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div class="toast" id="toast">
  <span id="toast-msg"></span>
</div>

<script>
  const API = window.location.protocol === 'file:' ? 'http://127.0.0.1:8000' : window.location.origin;
  App.mount('usuarios');

  let _users        = [];
  let _editUserId   = null;
  let _deleteUserId = null;
  let _toastTimer   = null;

  /* ── Roles ──────────────────────────────── */
  const ROLES = ['Operações','Financeiro','Administrador','Diretor'];

  function roleBadge(role) {
    const cls = 'role-' + role.replace(/\s/g, '');
    return `<span class="role-badge ${cls}">${role}</span>`;
  }

  function statusBadge(ativo) {
    return ativo
      ? `<span class="status-badge status-ativo">Ativo</span>`
      : `<span class="status-badge status-pendente">Aguardando ativação</span>`;
  }

  /* ── Renderização ───────────────────────── */
  function renderUsers(list) {
    const grid = document.getElementById('users-grid');
    if (!list.length) {
      grid.innerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/></svg>
        <p>Nenhum usuário cadastrado ainda.</p></div>`;
      return;
    }
    grid.innerHTML = list.map(u => `
      <div class="user-card-item">
        <div class="user-card-header">
          <div class="user-avatar-lg">${u.avatar || u.name.slice(0,2).toUpperCase()}</div>
          <div class="user-info-main">
            <div class="user-info-name">${u.name}</div>
            <div class="user-info-email">${u.email}</div>
          </div>
        </div>
        <div class="user-card-meta">
          ${roleBadge(u.role)}
          ${statusBadge(u.ativo)}
        </div>
        <div class="user-card-actions">
          ${!u.ativo ? `<button class="btn btn-secondary btn-sm" onclick="resendWelcome('${u.id}','${u.name}')">Reenviar convite</button>` : ''}
          <button class="btn btn-ghost btn-sm" onclick="openEditModal('${u.id}')">Editar</button>
          <button class="btn btn-danger btn-sm"  onclick="openDeleteModal('${u.id}','${u.name}')">Excluir</button>
        </div>
      </div>`).join('');
  }

  /* ── Carregar usuários ──────────────────── */
  async function loadUsers() {
    try {
      const r = await fetch(`${API}/api/admin/users`, { credentials: 'include' });
      if (!r.ok) throw new Error();
      _users = await r.json();
      renderUsers(_users);
    } catch {
      document.getElementById('users-grid').innerHTML =
        `<div class="empty-state"><p>Erro ao carregar usuários.</p></div>`;
    }
  }

  /* ── Modal criar ────────────────────────── */
  function openCreateModal() {
    _editUserId = null;
    document.getElementById('user-modal-title').textContent = 'Novo Usuário';
    document.getElementById('u-submit-btn').textContent    = 'Criar e enviar convite';
    document.getElementById('u-name').value  = '';
    document.getElementById('u-email').value = '';
    document.getElementById('u-email').disabled = false;
    document.getElementById('u-role').value  = 'Operações';
    document.getElementById('u-email-info').style.display = 'block';
    document.getElementById('u-error').style.display      = 'none';
    document.getElementById('user-modal').classList.add('open');
    setTimeout(() => document.getElementById('u-name').focus(), 80);
  }

  /* ── Modal editar ───────────────────────── */
  function openEditModal(id) {
    const u = _users.find(x => x.id === id);
    if (!u) return;
    _editUserId = id;
    document.getElementById('user-modal-title').textContent = 'Editar Usuário';
    document.getElementById('u-submit-btn').textContent    = 'Salvar alterações';
    document.getElementById('u-name').value  = u.name;
    document.getElementById('u-email').value = u.email;
    document.getElementById('u-email').disabled = true;
    document.getElementById('u-role').value  = u.role;
    document.getElementById('u-email-info').style.display = 'none';
    document.getElementById('u-error').style.display      = 'none';
    document.getElementById('user-modal').classList.add('open');
    setTimeout(() => document.getElementById('u-name').focus(), 80);
  }

  function closeUserModal() {
    document.getElementById('user-modal').classList.remove('open');
    _editUserId = null;
  }

  /* ── Submit criar/editar ────────────────── */
  async function submitUserModal() {
    const name  = document.getElementById('u-name').value.trim();
    const email = document.getElementById('u-email').value.trim().toLowerCase();
    const role  = document.getElementById('u-role').value;
    const errEl = document.getElementById('u-error');
    const btn   = document.getElementById('u-submit-btn');

    if (!name)  { showFieldError('Nome é obrigatório.'); return; }
    if (!_editUserId && !email) { showFieldError('E-mail é obrigatório.'); return; }

    btn.disabled = true;
    btn.textContent = _editUserId ? 'Salvando...' : 'Criando...';
    errEl.style.display = 'none';

    try {
      let r;
      if (_editUserId) {
        r = await fetch(`${API}/api/admin/users/${_editUserId}`, {
          method: 'PUT', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, role }),
        });
      } else {
        r = await fetch(`${API}/api/admin/users`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, role }),
        });
      }

      const data = await r.json();
      if (!r.ok) throw new Error(data.detail || 'Erro ao salvar.');

      closeUserModal();
      await loadUsers();

      if (!_editUserId) {
        const msg = data.email_sent
          ? `Usuário criado! E-mail de boas-vindas enviado para ${email}.`
          : `Usuário criado! E-mail não enviado — configure o SMTP no servidor.`;
        showToast(msg, data.email_sent ? 'success' : 'error');
      } else {
        showToast('Usuário atualizado com sucesso.', 'success');
      }
    } catch (e) {
      errEl.textContent  = e.message;
      errEl.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = _editUserId ? 'Salvar alterações' : 'Criar e enviar convite';
    }
  }

  function showFieldError(msg) {
    const el = document.getElementById('u-error');
    el.textContent = msg; el.style.display = 'block';
  }

  /* ── Reenviar convite ───────────────────── */
  async function resendWelcome(id, name) {
    try {
      const r = await fetch(`${API}/api/admin/users/${id}/resend-welcome`, {
        method: 'POST', credentials: 'include',
      });
      if (!r.ok) {
        const d = await r.json();
        throw new Error(d.detail || 'Erro ao reenviar.');
      }
      showToast(`E-mail de boas-vindas reenviado para ${name}.`, 'success');
    } catch (e) {
      showToast(e.message, 'error');
    }
  }

  /* ── Modal excluir ──────────────────────── */
  function openDeleteModal(id, name) {
    _deleteUserId = id;
    document.getElementById('delete-modal-sub').textContent =
      `Excluir "${name}"? O usuário perderá o acesso imediatamente. Esta ação não pode ser desfeita.`;
    document.getElementById('delete-modal').classList.add('open');
  }

  function closeDeleteModal() {
    _deleteUserId = null;
    document.getElementById('delete-modal').classList.remove('open');
  }

  async function confirmDelete() {
    if (!_deleteUserId) return;
    try {
      const r = await fetch(`${API}/api/admin/users/${_deleteUserId}`, {
        method: 'DELETE', credentials: 'include',
      });
      if (r.status !== 204 && !r.ok) {
        const d = await r.json();
        throw new Error(d.detail || 'Erro ao excluir.');
      }
      closeDeleteModal();
      await loadUsers();
      showToast('Usuário excluído.', 'success');
    } catch (e) {
      closeDeleteModal();
      showToast(e.message, 'error');
    }
  }

  /* ── Toast ──────────────────────────────── */
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    clearTimeout(_toastTimer);
    document.getElementById('toast-msg').textContent = msg;
    t.className = `toast ${type} show`;
    _toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
  }

  /* ── Fechar modais com Esc ───────────────── */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeUserModal();
      closeDeleteModal();
    }
  });

  /* ── Init ───────────────────────────────── */
  loadUsers();
</script>
</body>
</html>
