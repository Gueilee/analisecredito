<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solicitações — Análise de Crédito | Vendemmia</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <script src="db.js?v=5"></script>
  <script src="components.js?v=5"></script>
  <link rel="stylesheet" href="shared.css" />
  <style>
    /* ── Page layout ─────────────────────────────────────── */
    .page-header {
      margin-bottom: 1.5rem;
    }
    .page-title {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -.3px;
    }
    .page-sub {
      font-size: .83rem;
      color: var(--text-muted);
      margin-top: .2rem;
    }

    /* ── Toolbar ─────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.4rem;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
      max-width: 360px;
    }
    .search-wrap svg {
      position: absolute;
      left: .9rem;
      top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      stroke: var(--text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: .62rem 1rem .62rem 2.5rem;
      background: var(--purple-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: .84rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .search-input::placeholder { color: var(--text-faint); }
    .search-input:focus {
      border-color: var(--purple-accent);
      box-shadow: 0 0 0 3px rgba(66,44,118,.2);
    }

    .btn-new {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .62rem 1.2rem;
      background: linear-gradient(135deg, var(--brand-deep-purple), var(--brand-pink));
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: inherit;
      font-size: .84rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: 0 3px 14px rgba(255,47,105,.25);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-new:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(255,47,105,.38);
    }
    .btn-new svg { width: 15px; height: 15px; }

    /* ── Filter tabs ─────────────────────────────────────── */
    .filter-tabs {
      display: flex;
      gap: .4rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: .42rem 1rem;
      border-radius: 99px;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: .78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .18s;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .filter-tab:hover {
      border-color: var(--purple-accent);
      color: var(--text-secondary);
    }
    .filter-tab.active {
      background: rgba(66,44,118,.35);
      border-color: var(--purple-accent);
      color: var(--text-primary);
      font-weight: 600;
    }
    .filter-tab .tab-count {
      background: rgba(255,255,255,.1);
      border-radius: 99px;
      padding: .05rem .45rem;
      font-size: .7rem;
      font-weight: 700;
    }
    .filter-tab.active .tab-count {
      background: rgba(124,58,237,.4);
    }

    /* ── Table card ──────────────────────────────────────── */
    .table-card {
      background: var(--purple-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .83rem;
    }

    .data-table th {
      background: rgba(15,11,34,.6);
      color: var(--text-faint);
      font-size: .68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: .75rem 1.1rem;
      text-align: left;
      border-bottom: 1px solid var(--glass-border);
      white-space: nowrap;
    }

    .data-table td {
      padding: .9rem 1.1rem;
      border-bottom: 1px solid rgba(66,44,118,.12);
      color: var(--text-secondary);
      vertical-align: middle;
    }

    .data-table tr:last-child td { border-bottom: none; }

    .data-table tbody tr {
      transition: background .15s;
    }
    .data-table tbody tr:hover {
      background: rgba(66,44,118,.1);
    }

    .empresa-name {
      font-weight: 600;
      color: var(--text-primary);
      display: block;
    }
    .empresa-cnpj {
      font-size: .74rem;
      color: var(--text-faint);
      margin-top: .12rem;
    }

    /* Badge de status */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .25rem .7rem;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .badge.aprovado   { background: rgba(1,225,142,.1);   color: #01E18E; }
    .badge.negado     { background: rgba(239,68,68,.1);   color: #ef4444; }
    .badge.em-analise { background: rgba(59,130,246,.1);  color: #60a5fa; }
    .badge.pendente   { background: rgba(245,158,11,.1);  color: #f59e0b; }

    /* Ações */
    .actions { display: flex; gap: .45rem; align-items: center; }

    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      transition: all .15s;
    }
    .btn-action:hover {
      border-color: var(--purple-accent);
      color: var(--purple-light);
      background: rgba(66,44,118,.2);
    }
    .btn-action svg { width: 13px; height: 13px; }

    /* Empty state */
    .empty-state {
      padding: 4rem 2rem;
      text-align: center;
    }
    .empty-state svg {
      width: 48px; height: 48px;
      stroke: var(--text-faint);
      margin: 0 auto 1rem;
      display: block;
    }
    .empty-state p {
      color: var(--text-muted);
      font-size: .88rem;
    }
    .empty-state .empty-title {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: .35rem;
    }

    /* Paginação / contagem */
    .table-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .8rem 1.1rem;
      border-top: 1px solid var(--glass-border);
      font-size: .76rem;
      color: var(--text-muted);
    }

    /* ── Scroll do conteúdo principal ───────────────────── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.8rem;
    }

    /* ── Paginação ───────────────────────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      gap: .3rem;
    }
    .page-btn {
      min-width: 32px;
      height: 32px;
      padding: 0 .55rem;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: .78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: .3rem;
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--purple-accent);
      color: var(--text-primary);
      background: rgba(66,44,118,.15);
    }
    .page-btn.active {
      background: rgba(66,44,118,.45);
      border-color: var(--purple-accent);
      color: #fff;
      font-weight: 700;
    }
    .page-btn:disabled { opacity: .3; cursor: not-allowed; }
    .page-ellipsis {
      color: var(--text-faint);
      font-size: .78rem;
      padding: 0 .15rem;
      user-select: none;
    }

    /* ── Topbar customização ─────────────────────────────── */
    .topbar-greeting { font-size: .78rem; color: var(--brand-neon-green); font-weight: 500; margin-bottom: .12rem; }
    .topbar-title h1 { font-size: 1.05rem; }
  </style>
</head>
<body>
<script>const session = DB.auth.requireAuth();</script>

<div class="app-shell">

  <!-- sidebar montado por components.js -->
  <aside class="sidebar"></aside>

  <!-- ══ MAIN ═════════════════════════════════════════════ -->
  <div class="main-area">

    <header class="topbar">
      <div class="topbar-title">
        <div class="topbar-greeting" id="topbar-greeting"></div>
        <h1>Solicitações</h1>
      </div>
      <div class="topbar-right">
        <div class="topbar-user">
          <div class="user-avatar sm" id="topbar-avatar">--</div>
          <span id="topbar-name" style="font-size:.83rem;color:var(--text-secondary);"></span>
        </div>
      </div>
    </header>

    <div class="main-content">

      <div class="page-header">
        <div class="page-title">Todas as Solicitações</div>
        <div class="page-sub">Gerencie e acompanhe o status de cada análise de crédito</div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input
            type="text"
            class="search-input"
            id="search-input"
            placeholder="Buscar por empresa, CNPJ ou responsável…"
            oninput="currentPage=1; renderTable()"
          />
        </div>
        <a href="nova-solicitacao.html" class="btn-new">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nova Análise
        </a>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-status="todos" onclick="setFilter('todos')">
          Todas <span class="tab-count" id="count-todos">0</span>
        </button>
        <button class="filter-tab" data-status="pendente" onclick="setFilter('pendente')">
          Pendente <span class="tab-count" id="count-pendente">0</span>
        </button>
        <button class="filter-tab" data-status="em_analise" onclick="setFilter('em_analise')">
          Em Análise <span class="tab-count" id="count-em_analise">0</span>
        </button>
        <button class="filter-tab" data-status="em_comite" onclick="setFilter('em_comite')">
          Em Comitê <span class="tab-count" id="count-em_comite">0</span>
        </button>
        <button class="filter-tab" data-status="aprovado" onclick="setFilter('aprovado')">
          Aprovadas <span class="tab-count" id="count-aprovado">0</span>
        </button>
        <button class="filter-tab" data-status="negado" onclick="setFilter('negado')">
          Negadas <span class="tab-count" id="count-negado">0</span>
        </button>
      </div>

      <!-- Tabela -->
      <div class="table-card">
        <table class="data-table">
          <thead>
            <tr>
              <th>Empresa</th>
              <th>Perfil</th>
              <th>Operação</th>
              <th>Data</th>
              <th>Status</th>
              <th style="width:90px;text-align:center;">Ações</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
        <div id="empty-state" class="empty-state" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <div class="empty-title">Nenhuma solicitação encontrada</div>
          <p>Tente ajustar os filtros ou criar uma nova análise.</p>
        </div>
        <div class="table-footer">
          <span id="result-count">0 resultados</span>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  /* ── Sidebar + Sessão ───────────────────────────────── */
  App.mount('solicitacoes');
  App.initUser();
  App.greeting('topbar-greeting');

  /* ── Estado ─────────────────────────────────────────── */
  const urlStatus   = new URLSearchParams(location.search).get('status');
  let currentFilter = urlStatus || 'pendente';
  let currentPage   = 1;
  const PAGE_SIZE   = 10;

  function setFilter(status) {
    currentFilter = status;
    currentPage   = 1;
    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.status === status);
    });
    renderTable();
  }

  function goToPage(p) {
    currentPage = p;
    renderTable();
    const mc = document.querySelector('.main-content');
    if (mc) mc.scrollTo({ top: 0, behavior: 'smooth' });
  }

  /* ── Render ─────────────────────────────────────────── */
  function renderTable() {
    const query = (document.getElementById('search-input').value || '').toLowerCase().trim();
    const all   = DB.solicitacoes.getAll();

    /* contagens para as abas */
    const cnts = { todos: all.length, pendente: 0, em_analise: 0, em_comite: 0, aprovado: 0, negado: 0 };
    all.forEach(s => { if (cnts[s.status] !== undefined) cnts[s.status]++; });
    Object.entries(cnts).forEach(([k, v]) => {
      const el = document.getElementById('count-' + k);
      if (el) el.textContent = v;
    });

    /* filtro + busca */
    let rows = all;
    if (currentFilter !== 'todos') rows = rows.filter(s => s.status === currentFilter);
    if (query) rows = rows.filter(s =>
      (s.empresa || '').toLowerCase().includes(query) ||
      (s.cnpj    || '').toLowerCase().includes(query) ||
      (s.solicitanteNome || '').toLowerCase().includes(query)
    );

    const totalRows  = rows.length;
    const totalPages = Math.max(1, Math.ceil(totalRows / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;

    const start    = (currentPage - 1) * PAGE_SIZE;
    const pageRows = rows.slice(start, start + PAGE_SIZE);

    const tbody = document.getElementById('table-body');
    const empty = document.getElementById('empty-state');
    const cntEl = document.getElementById('result-count');
    const pgEl  = document.getElementById('pagination');

    if (!totalRows) {
      tbody.innerHTML = '';
      empty.style.display = '';
      cntEl.textContent   = '0 resultados';
      pgEl.innerHTML      = '';
      return;
    }
    empty.style.display = 'none';

    const end = Math.min(start + PAGE_SIZE, totalRows);
    cntEl.textContent = 'Mostrando ' + (start + 1) + '–' + end + ' de ' + totalRows;

    tbody.innerHTML = pageRows.map(s => {
      const statusKey  = DB.utils.statusBadge[s.status] || 'pendente';
      const statusText = DB.utils.statusLabel[s.status]  || s.status;
      const perfil     = DB.utils.integradoLabel[s.integrado] || s.segmento || '—';
      const operacao   = DB.utils.tipoOpLabel[s.tipoOperacao] || DB.utils.modalLabel[s.modal] || s.modal || '—';
      const data       = DB.utils.fmtDate(s.dataSolicitacao || s.createdAt);

      return '<tr>' +
        '<td>' +
          '<span class="empresa-name">' + (s.empresa || '—') + '</span>' +
          '<span class="empresa-cnpj">'  + (s.cnpj    || '—') + '</span>' +
        '</td>' +
        '<td>' + perfil + '</td>' +
        '<td>' + operacao + '</td>' +
        '<td style="white-space:nowrap;">' + data + '</td>' +
        '<td>' +
          '<span class="badge ' + statusKey + '">' + statusText + '</span>' +
          (s.validadeDias ? DB.utils.validadeBadgeHtml(s) : '') +
        '</td>' +
        '<td>' +
          '<div class="actions" style="justify-content:center;">' +
            '<a href="analise-financeira.html?id=' + s.id + '" class="btn-action" title="Análise Financeira" style="color:var(--purple-light);border-color:rgba(124,58,237,.35);">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>' +
            '</a>' +
            '<a href="consultar.html?id=' + s.id + '" class="btn-action" title="Visualizar">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>' +
            '</a>' +
            '<a href="nova-solicitacao.html?id=' + s.id + '" class="btn-action" title="Editar">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
            '</a>' +
            (function() {
              if (!s.validadeDias) return '';
              var _vs = DB.utils.calcValidadeStatus(s);
              if (!_vs || _vs.days > 30) return '';
              return '<button onclick="reabrirSolicitacao(\'' + s.id + '\')" class="btn-action" title="Reabrir para Reanálise" style="color:#ef4444;border-color:rgba(239,68,68,.35);">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/></svg>' +
                '</button>';
            })() +
          '</div>' +
        '</td>' +
      '</tr>';
    }).join('');

    /* ── Controles de paginação ─────────────────────────── */
    if (totalPages <= 1) { pgEl.innerHTML = ''; return; }

    var ICO_PREV = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="15 18 9 12 15 6"/></svg>';
    var ICO_NEXT = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="9 18 15 12 9 6"/></svg>';

    var pages = [];
    if (totalPages <= 7) {
      for (var i = 1; i <= totalPages; i++) pages.push(i);
    } else {
      pages.push(1);
      if (currentPage > 3) pages.push('...');
      for (var i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) pages.push(i);
      if (currentPage < totalPages - 2) pages.push('...');
      pages.push(totalPages);
    }

    pgEl.innerHTML =
      '<button class="page-btn nav" onclick="goToPage(' + (currentPage - 1) + ')"' + (currentPage === 1 ? ' disabled' : '') + '>' + ICO_PREV + '</button>' +
      pages.map(function(p) {
        if (p === '...') return '<span class="page-ellipsis">…</span>';
        return '<button class="page-btn' + (p === currentPage ? ' active' : '') + '" onclick="goToPage(' + p + ')">' + p + '</button>';
      }).join('') +
      '<button class="page-btn nav" onclick="goToPage(' + (currentPage + 1) + ')"' + (currentPage === totalPages ? ' disabled' : '') + '>' + ICO_NEXT + '</button>';
  }

  function reabrirSolicitacao(solId) {
    var _sol = DB.solicitacoes.getById(solId);
    var _vs  = _sol ? DB.utils.calcValidadeStatus(_sol) : null;
    var _msg = (_vs && _vs.days < 0) ? 'vencida' : 'vencendo';
    if (!confirm('Reabrir para reanálise?\n\nA análise de "' + (_sol ? _sol.empresa : '') + '" está ' + _msg + '. Todo o parecer, limites e decisão do Comitê serão apagados.\n\nConfirmar?')) return;
    DB.solicitacoes.update(solId, {
      status:            'pendente',
      parecerTecnico:    '',
      limiteAprovado:    '',
      prazoAprovado:     '',
      validadeDias:      null,
      decisaoAnalista:   '',
      decisao_at:        '',
      deliberacaoComite: '',
      decisaoComite:     '',
      comite_at:         '',
    });
    window.location.href = 'analise-financeira.html?id=' + solId;
  }

  DB.ready.then(function() { setFilter(currentFilter); });
</script>
</body>
</html>
